# Render Blueprint — one free web service (API + built frontend) + free Postgres.
# Deploy: push to GitHub, then "New > Blueprint" in Render and point it at this repo.
services:
  - type: web
    name: obradoriq
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: obradoriq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Token guarding POST /api/admin/generate (one-off data population). Auto-generated;
      # read it in the Render dashboard to call the endpoint. Empty disables the endpoint.
      - key: ADMIN_TOKEN
        generateValue: true
      - key: SEED_ON_START
        value: "true"
      # Fetch the target day's real Madrid weather (Open-Meteo) when building a plan.
      - key: WEATHER_AUTOFETCH
        value: "true"
      # Set to "true" ONCE to wipe+reseed the demo with Madrid locations + weather history,
      # then set back to "false". (Needed only for the pre-existing deployment.)
      - key: RESEED_ON_START
        value: "false"
      # LLM phrasing. Default offline = deterministic stubs (free, reproducible).
      # For live phrasing with a FREE provider: set LLM_OFFLINE=false,
      # LLM_PROVIDER=groq (or nvidia), and LLM_API_KEY in the dashboard.
      - key: LLM_OFFLINE
        value: "true"
      - key: LLM_PROVIDER
        value: "groq"          # groq | nvidia | anthropic | openai_compatible
      - key: LLM_API_KEY
        sync: false            # set manually in the dashboard if going live

databases:
  - name: obradoriq-db
    plan: free
